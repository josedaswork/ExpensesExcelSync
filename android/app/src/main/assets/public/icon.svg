<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Soft circle behind euro -->
  <circle cx="256" cy="240" r="130" fill="#0ea5e9" opacity="0.10"/>
  <!-- Euro symbol -->
  <text x="256" y="290" text-anchor="middle" font-size="220" font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#0284c7">€</text>
  <!-- Small bar chart -->
  <rect x="168" y="400" width="36" height="44" rx="6" fill="#0ea5e9" opacity="0.35"/>
  <rect x="220" y="384" width="36" height="60" rx="6" fill="#0ea5e9" opacity="0.50"/>
  <rect x="272" y="366" width="36" height="78" rx="6" fill="#0ea5e9" opacity="0.65"/>
  <rect x="324" y="348" width="36" height="96" rx="6" fill="#0ea5e9" opacity="0.80"/>
</svg>
